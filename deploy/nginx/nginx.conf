# nginx.conf — Edge layer in the DMZ
#
# Responsibilities:
#   • TLS termination and certificate management
#   • Static file serving (no hop to Pingora)
#   • IP/geo blocking at the network edge
#   • Forwarding all /api/* traffic to Pingora
#
# Pingora handles everything after this point.

worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
}

http {
    # ── Logging ────────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"upstream":"$upstream_addr",'
        '"request_time":$request_time}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Security defaults ──────────────────────────────────────────────────────
    server_tokens     off;
    keepalive_timeout 65;

    # ── Rate limiting at the IP level (coarse; Pingora does per-user fine RL) ──
    limit_req_zone $binary_remote_addr zone=global:10m rate=200r/s;

    # ── Geo-blocking: drop known bad regions before TLS even completes ─────────
    # geo $blocked {
    #     default         0;
    #     192.0.2.0/24    1;   # example: block this CIDR
    # }

    # ── Upstream: Pingora middleware ───────────────────────────────────────────
    upstream pingora {
        server 127.0.0.1:6191;
        keepalive 64;           # HTTP/1.1 keepalive pool to Pingora
    }

    # ── HTTPS server ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.example.com;

        # TLS — use your cert manager of choice (Certbot, cert-manager, etc.)
        ssl_certificate     /etc/ssl/certs/api.example.com.crt;
        ssl_certificate_key /etc/ssl/private/api.example.com.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS — only enable after confirming everything works
        add_header Strict-Transport-Security "max-age=63072000" always;

        # ── Static assets — serve directly, never go to Pingora ───────────────
        location /static/ {
            root /var/www;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Health check — Pingora exposes /healthz ────────────────────────────
        location = /healthz {
            proxy_pass http://pingora;
        }

        # ── API traffic → Pingora ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=global burst=50 nodelay;

            # CRITICAL: disable NGINX buffering for this path.
            # If NGINX buffers the body AND Pingora buffers it, latency doubles
            # and memory usage doubles. Let the bytes flow straight through.
            proxy_buffering       off;
            proxy_request_buffering off;

            proxy_pass         http://pingora;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";          # enable keepalives

            # Forward real client IP so Pingora can use it for fallback RL
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Avoid header size blowup: strip NGINX's own tracking before adding ours
            proxy_hide_header  X-Powered-By;

            proxy_connect_timeout  5s;
            proxy_read_timeout     60s;
            proxy_send_timeout     60s;
        }
    }

    # ── HTTP redirect ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.example.com;
        return 301 https://$host$request_uri;
    }
}
